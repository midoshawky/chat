name: pomac_chat_app
description: "A reusable Flutter chat package with real-time Socket.IO and REST support."
version: 0.1.0
homepage:

environment:
  sdk: ^3.4.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  socket_io_client: ^3.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  pretty_dio_logger:
  flutter_svg_image:
  jovial_svg: ^1.1.29
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

dependency_overrides: 
flutter_image_compress: ^2.4.0

flutter:
  assets:
    - assets/icons/
  fonts:
    - family: ProductSans
      fonts:
        - asset: fonts/ProductSans-Regular.ttf
        - asset: fonts/ProductSans-Medium.ttf
          weight: 500
